name: Defensive Alerts Cron

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call defensive-alerts cron endpoint
        run: |
          curl -f -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://unsou-system.kawapon7.workers.dev/api/cron/defensive-alerts
